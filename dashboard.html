<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard - Nutrition Tracker</title>
    <link rel="stylesheet" href="src/style.css" />
    
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script type="module" src="src/dashboard.js"></script>
  </head>
  <body class="dashboard-body">
    <nav class="navbar">
      <div class="navbar-container">
        <div class="navbar-brand">
          <h1>
            <i class="fas fa-heartbeat"></i> Nutrition Tracker - Admin Portal
          </h1>
          <div class="navbar-links">
            <!-- <a href="dashboard.html" class="active">All Use</a> -->
          </div>
        </div>
        <div style="margin-left: auto; padding-left: 3rem">
          <button id="logoutBtn" class="btn-logout">Logout</button>
        </div>
      </div>
    </nav>

    <div class="container">
      <div class="page-header admin-dashboard-header">
        <h2 style="font-size: clamp(1.2rem, 2.5vw, 2rem); margin: 0;">
  Admin Dashboard - Patient Monitoring
</h2>
        <p style="color: #6b7280; margin-top: 0.5rem">
          View and manage all users, perform CRUD operations
        </p>
      </div>

      <div id="patientsPanel">
        <div id="loading" class="loading hidden">
          <div class="spinner"></div>
          <p>Loading data...</p>
        </div>

        <div id="error" class="alert alert-error hidden"></div>

        <!-- Pie Chart - Top Center -->
        <div class="dashboard-pie-section">
          <div class="pie-chart-wrapper">
            <h3 class="pie-chart-title">
              <i class="fas fa-chart-pie"></i> Patient Status Distribution
            </h3>
            <div class="pie-chart-with-legend">
              <div class="pie-chart-container">
                <canvas id="statusPieChart"></canvas>
              </div>
              <div id="pieChartLegend" class="pie-chart-legend"></div>
            </div>
          </div>
        </div>

        <!-- Search, Filter & Reset Buttons -->
        <div class="dashboard-controls">
          <div class="dashboard-controls-row">
            <div class="search-box-wrap">
              <i class="fas fa-search search-icon"></i>
              <input
                type="text"
                id="searchInput"
                class="search-input"
                placeholder="Search patients by name..."
                autocomplete="off"
              />
            </div>
            <button id="resetButton" class="reset-btn">
              <i class="fas fa-undo"></i> Reset
            </button>
          </div>
        </div>

        <div class="dashboard-controls-bottom">
          <div class="filter-wrap">
            <label for="statusFilter" class="filter-label">
              <i class="fas fa-filter"></i> Filter
            </label>
            <select id="statusFilter" class="filter-select">
              <option value="">All statuses</option>
              <option value="Healthy">Healthy</option>
              <option value="Warning">Warning</option>
              <option value="Alert">Alert</option>
            </select>
          </div>
          <div class="sort-wrap">
            <label for="sortSelect" class="filter-label">
              <i class="fas fa-sort-alpha-down"></i> Sort
            </label>
            <select id="sortSelect" class="filter-select">
              <option value="az">A → Z (Name)</option>
              <option value="za">Z → A (Name)</option>
            </select>
          </div>
        </div>

        <div class="table-card">
          <table class="table">
            <thead>
              <tr>
                <th>Name</th>
                <th>Last Updated</th>
                <th>Age</th>
                <th>BMI</th>
                <th>Status</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="userTableBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </body>
</html>
