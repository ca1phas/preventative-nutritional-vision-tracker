<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Nutrition Tracker</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="src/style.css" />
    <link rel="stylesheet" href="src/responsive.css" />
    <script type="module" src="/src/login.js"></script>
  </head>
  <body>
    <div class="login-container">
      <div class="login-card">
        <div class="login-header">
          <h1><i class="fas fa-heartbeat"></i> Nutrition Tracker</h1>
          <p>Healthcare Monitoring System</p>
        </div>

        <form id="loginForm">
          <div class="form-group">
            <label for="email">Email</label>
            <input
              type="email"
              id="email"
              required
              placeholder="Enter your email"
            />
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input
              type="password"
              id="password"
              required
              placeholder="Enter your password"
            />
          </div>
          <p
            id="errorMsg"
            style="color: red; display: none; margin-bottom: 1rem"
          ></p>
          <button type="submit" class="btn btn-primary" id="loginBtn">
            Login
          </button>
        </form>

        <div style="text-align: center; margin-top: 1.5rem">
          <a
            href="index.html"
            style="color: #667eea; text-decoration: none; font-weight: 500"
            >Back to Homepage</a
          >
          </a>
        </div>
      </div>
    </div>
  </body>
</html>
